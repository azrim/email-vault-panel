<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Vault</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --border: #2a3140;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #6ea8fe;
      --ok: #3dd68c;
      --warn: #f0b429;
      --danger: #f07178;
      --radius: 10px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: .75rem 1.25rem;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    h1 {
      font-size: 1.1rem;
      margin: 0;
      letter-spacing: .02em;
    }
    h1 span { color: var(--muted); font-weight: 500; font-size: .85rem; }
    .stats { color: var(--muted); font-size: .85rem; }
    .stats b { color: var(--text); font-weight: 600; }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.25rem 3rem;
      display: grid;
      gap: 1rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem .6rem;
      align-items: center;
    }
    label { font-size: .8rem; color: var(--muted); }
    input, select, button, textarea {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0c0e13;
      color: var(--text);
      padding: .45rem .65rem;
    }
    input[type="number"] { width: 4.5rem; }
    input[type="search"], input[type="text"] { min-width: 10rem; flex: 1; }
    button {
      cursor: pointer;
      background: #243049;
      border-color: #334566;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: #1e3a6e; border-color: #3d6fbf; }
    button.danger { background: #3a1f24; border-color: #7a3a44; color: #ffc9ce; }
    button.ghost { background: transparent; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }
    th, td {
      text-align: left;
      padding: .55rem .4rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .email { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .85rem; }
    .badge {
      display: inline-block;
      padding: .1rem .45rem;
      border-radius: 999px;
      font-size: .72rem;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .badge.fresh { color: var(--ok); border-color: #2a6b4a; }
    .badge.archived { color: var(--muted); }
    .actions { display: flex; flex-wrap: wrap; gap: .35rem; }
    .actions button { padding: .3rem .5rem; font-size: .8rem; }
    .toast {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: #1b2433;
      border: 1px solid var(--border);
      padding: .65rem .9rem;
      border-radius: 8px;
      max-width: 22rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 5;
    }
    .toast.show { opacity: 1; }
    .empty { color: var(--muted); padding: 1rem 0; }
    .phase {
      font-size: .75rem;
      color: var(--warn);
      border: 1px solid #5c4a1a;
      background: #2a220e;
      padding: .2rem .5rem;
      border-radius: 6px;
    }
    @media (max-width: 640px) {
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Email Vault <span id="domainLabel"></span></h1>
    <div class="row">
      <span class="phase">phase 1 · aliases only</span>
      <div class="stats" id="stats">—</div>
    </div>
  </header>
  <main>
    <section class="card">
      <div class="row" style="margin-bottom:.75rem">
        <div>
          <label>Count</label><br/>
          <input id="genCount" type="number" min="1" max="500" value="5" />
        </div>
        <div>
          <label>Prefix</label><br/>
          <input id="genPrefix" type="text" value="x" style="width:5rem" />
        </div>
        <div>
          <label>Style</label><br/>
          <select id="genStyle">
            <option value="random">random</option>
            <option value="word">word</option>
            <option value="seq">seq</option>
          </select>
        </div>
        <div style="flex:1;min-width:10rem">
          <label>Notes</label><br/>
          <input id="genNotes" type="text" placeholder="optional" />
        </div>
        <div style="align-self:end">
          <button class="primary" id="btnGenerate" type="button">+ Generate</button>
        </div>
      </div>
      <div class="row">
        <input id="search" type="search" placeholder="Search email or notes…" />
        <label class="row" style="gap:.35rem;color:var(--muted);font-size:.85rem">
          <input id="showArchived" type="checkbox" /> show archived
        </label>
        <button class="ghost" id="btnRefresh" type="button">Refresh</button>
      </div>
    </section>

    <section class="card">
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Status</th>
            <th>Created</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" hidden>No aliases yet. Generate some above.</div>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script>
    const $ = (id) => document.getElementById(id);
    let toastTimer;

    function toast(msg) {
      const el = $("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json", ...(opts.headers || {}) },
        ...opts,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const detail = data.detail || data.message || res.statusText;
        throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
      }
      return data;
    }

    function renderStats(counts) {
      if (!counts) return;
      const fresh = counts.fresh || 0;
      const arch = counts.archived || 0;
      const total = counts.total || 0;
      $("stats").innerHTML = `total <b>${total}</b> · fresh <b>${fresh}</b> · archived <b>${arch}</b>`;
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
      );
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        toast("Copied " + text);
      } catch {
        toast("Copy failed");
      }
    }

    function rowHtml(item) {
      const isArch = item.status === "archived";
      const archiveBtn = isArch
        ? `<button type="button" data-act="unarchive" data-id="${item.id}">Unarchive</button>`
        : `<button type="button" class="danger" data-act="archive" data-id="${item.id}">Archive</button>`;
      return `<tr>
        <td class="email">${esc(item.email)}</td>
        <td><span class="badge ${esc(item.status)}">${esc(item.status)}</span></td>
        <td>${esc(item.created_at)}</td>
        <td>${esc(item.notes)}</td>
        <td class="actions">
          <button type="button" data-act="copy" data-email="${esc(item.email)}">Copy</button>
          ${archiveBtn}
        </td>
      </tr>`;
    }

    async function loadList() {
      const q = $("search").value.trim();
      const include = $("showArchived").checked;
      const params = new URLSearchParams();
      if (q) params.set("q", q);
      if (include) params.set("include_archived", "true");
      const data = await api("/api/aliases?" + params.toString());
      renderStats(data.counts);
      const items = data.items || [];
      $("tbody").innerHTML = items.map(rowHtml).join("");
      $("empty").hidden = items.length > 0;
    }

    $("tbody").addEventListener("click", async (ev) => {
      const btn = ev.target.closest("button[data-act]");
      if (!btn) return;
      const act = btn.dataset.act;
      try {
        if (act === "copy") {
          await copyText(btn.dataset.email);
          return;
        }
        if (act === "archive") {
          await api(`/api/aliases/${btn.dataset.id}/archive`, { method: "POST" });
          toast("Archived");
        }
        if (act === "unarchive") {
          await api(`/api/aliases/${btn.dataset.id}/unarchive`, { method: "POST" });
          toast("Restored to fresh");
        }
        await loadList();
      } catch (e) {
        toast(e.message || String(e));
      }
    });

    $("btnGenerate").addEventListener("click", async () => {
      try {
        const body = {
          count: Number($("genCount").value) || 1,
          prefix: $("genPrefix").value || "x",
          style: $("genStyle").value,
          notes: $("genNotes").value || "",
        };
        const data = await api("/api/aliases/generate", {
          method: "POST",
          body: JSON.stringify(body),
        });
        toast(`Generated ${data.created.length}`);
        await loadList();
      } catch (e) {
        toast(e.message || String(e));
      }
    });

    $("btnRefresh").addEventListener("click", () => loadList().catch((e) => toast(e.message)));
    $("showArchived").addEventListener("change", () => loadList().catch((e) => toast(e.message)));
    let searchTimer;
    $("search").addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadList().catch((e) => toast(e.message)), 200);
    });

    (async () => {
      try {
        const h = await api("/api/health");
        $("domainLabel").textContent = "· " + (h.domain || "");
        renderStats(h.counts);
        await loadList();
      } catch (e) {
        toast(e.message || String(e));
      }
    })();
  </script>
</body>
</html>
